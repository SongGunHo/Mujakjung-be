
# =========================================
# 🌐 서버 설정
# =========================================
server:
  port: 8080        # 애플리케이션이 실행될 포트 번호


# =========================================
# 🌱 Spring 관련 설정
# =========================================
spring:

  # -------------------------------
  # 🍃 Thymeleaf 템플릿 설정
  # -------------------------------
  thymeleaf:
    cache: false    # 개발 시 템플릿 캐시 비활성화 (HTML 수정 즉시 반영)


  # -------------------------------
  # 🗄️ MySQL 데이터베이스 연결
  # -------------------------------
  datasource:
    # JDBC 접속 URL
    # - localhost : DB 서버 주소
    # - 3361      : MySQL 포트 (Docker 포트 매핑일 가능성 높음)
    # - mujakjung : 사용할 데이터베이스 이름
    # - 뒤 옵션들 : 시간대/인코딩/SSL 관련 설정
    url: jdbc:mysql://localhost:3361/mujakjung?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true

    username: mujakjung      # DB 접속 계정
    password: 1234           # DB 접속 비밀번호

    # MySQL JDBC 드라이버 클래스
    # (Spring Boot 최신 버전에서는 생략 가능하지만 명시해도 OK)
    driver-class-name: com.mysql.cj.jdbc.Driver


  # -------------------------------
  # 🧩 JPA / Hibernate 설정
  # -------------------------------
  jpa:
    hibernate:
      # 엔티티 기준으로 테이블 자동 생성/수정
      # update : 기존 테이블 유지 + 변경사항만 반영 (개발용 👍)
      # create : 실행 시마다 테이블 재생성 (데이터 삭제 ⚠️)
      # none   : 자동 생성 안 함 (운영 권장)
      ddl-auto: update

    show-sql: true   # 실행되는 SQL을 콘솔에 출력 (디버깅용)

    properties:
      hibernate:
        # SQL을 보기 좋게 줄바꿈/정렬해서 출력
        format_sql: true
jwt:
  secret: your-secret-key-your-secret-key-your-secret-key
  expiration: 3600000