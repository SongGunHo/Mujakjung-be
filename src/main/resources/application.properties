
# =========================================
# 🌱 애플리케이션 이름
# =========================================
# 로그, 모니터링 등에 표시되는 서비스 이름
spring.application.name=Mujakjung-be


# =========================================
# 🗄️ MySQL 데이터베이스 연결 설정
# =========================================

# JDBC 접속 URL
# - localhost : DB 서버 주소
# - 3361      : MySQL 포트 (Docker 포트 매핑일 가능성 높음)
# - mujakjung : 사용할 데이터베이스 이름
spring.datasource.url=jdbc:mysql://localhost:3361/mujakjung

# DB 접속 사용자 계정
spring.datasource.username=mujakjung

# DB 접속 비밀번호
spring.datasource.password=1234


# =========================================
# 🧩 JPA / Hibernate 설정
# =========================================

# 엔티티 기준으로 테이블 자동 생성/수정
# update : 기존 테이블 유지 + 변경사항만 반영 (개발용 👍)
# create : 실행할 때마다 테이블 새로 생성 (데이터 삭제 ⚠️)
# none   : 자동 생성 안 함 (운영 권장)
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL을 콘솔에 출력
# → 쿼리 동작 확인 및 디버깅에 매우 유용
spring.jpa.show-sql=true

# SQL을 보기 좋게 줄바꿈/정렬해서 출력
# → show-sql=true와 같이 쓰면 가독성 좋아짐
spring.jpa.properties.hibernate.format_sql=true